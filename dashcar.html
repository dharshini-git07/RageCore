<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RageCore - Dash Car</title>
<link rel="stylesheet" href="variable.css">
<style>

  body {
    min-height: 100vh;
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: var(--space-lg);
    font-family: var(--body-font);
    color: var(--text-primary);
    background-color: var(--bg-color);
    background-image:
        radial-gradient(circle at 15% 15%, rgba(139, 92, 246, .18), transparent 45%),
        radial-gradient(circle at 85% 85%, rgba(236, 72, 153, .16), transparent 45%);
    padding: var(--space-lg);
  }

  h2 {
    font-family: var(--heading-font);
    font-size: var(--fs-2xl);
    letter-spacing: 3px;
    background: var(--primary-gradient);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .hud {
    display: flex;
    gap: var(--space-xl);
    font-size: var(--fs-sm);
    color: var(--text-secondary);
  }

  .hud span { color: var(--accent-color); font-weight: var(--fw-semibold); }

  .board-wrap {
    position: relative;
    border-radius: var(--radius-lg);
    border: 1px solid var(--border-color);
    box-shadow: var(--shadow-lg), var(--shadow-primary);
    overflow: hidden;
    background: var(--bg-secondary);
  }

  canvas { display: block; }

  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: var(--space-md);
    background: rgba(13, 17, 23, 0.85);
    backdrop-filter: blur(2px);
  }

  .overlay.hide { display: none; }

  .overlay h3 {
    font-family: var(--heading-font);
    font-size: var(--fs-xl);
    letter-spacing: 2px;
  }

  .overlay h3.crash { color: var(--error-color); }
  .overlay h3.start { background: var(--primary-gradient); -webkit-background-clip: text; background-clip: text; color: transparent; }

  .overlay p {
    font-size: var(--fs-sm);
    color: var(--text-secondary);
    text-align: center;
    max-width: 280px;
  }

  button {
    padding: var(--space-sm) var(--space-lg);
    border: none;
    border-radius: var(--radius-md);
    background: var(--primary-gradient);
    color: var(--text-primary);
    font-family: var(--heading-font);
    font-size: var(--fs-sm);
    font-weight: var(--fw-semibold);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform var(--transition-fast), box-shadow var(--transition-fast);
  }

  button:hover {
    box-shadow: var(--shadow-primary);
    transform: translateY(-2px);
  }

  .hint {
    font-size: var(--fs-xs);
    color: var(--text-secondary);
    text-align: center;
  }

  .controls {
    display: none;
    gap: var(--space-md);
  }

  .controls button {
    width: 64px;
    height: 48px;
    font-size: var(--fs-lg);
  }

  @media (max-width: 520px) {
    .controls { display: flex; }
  }

</style>
</head>
<body>

  <h2>DASH CAR</h2>

  <div class="hud">
    <div>SCORE: <span id="score">0</span></div>
    <div>BEST: <span id="best">0</span></div>
    <div>SPEED: <span id="speed">1.0x</span></div>
  </div>

  <div class="board-wrap">
    <canvas id="board" width="360" height="520"></canvas>
    <div class="overlay" id="overlay">
      <h3 class="start" id="overlayTitle">DASH CAR</h3>
      <p id="overlayText">Dodge the incoming traffic. Arrow keys / A-D to steer lanes.</p>
      <button id="startBtn">Start Run</button>
    </div>
  </div>

  <p class="hint">Arrow Left/Right or A/D to switch lanes.</p>

  <div class="controls">
    <button id="leftBtn">◀</button>
    <button id="rightBtn">▶</button>
  </div>

  <script>
    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d');

    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const speedEl = document.getElementById('speed');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlayTitle');
    const overlayText = document.getElementById('overlayText');
    const startBtn = document.getElementById('startBtn');

    const cssVar = (name, fallback) =>
      (getComputedStyle(document.documentElement).getPropertyValue(name).trim() || fallback);

    const primary = cssVar('--primary-color', '#8B5CF6');
    const secondary = cssVar('--secondary-color', '#EC4899');
    const accent = cssVar('--accent-color', '#06B6D4');
    const roadColor = cssVar('--bg-secondary', '#161B22');
    const laneLine = cssVar('--border-color', '#2A2F3A');
    const errorColor = cssVar('--error-color', '#EF4444');

    const laneCount = 3;
    const laneWidth = canvas.width / laneCount;
    const carW = 46, carH = 78;

    let playerLane, obstacles, score, best, speed, running, animId, spawnTimer, roadOffset;

    function loadBest() {
      const stored = window.__ragecoreDashCarBest;
      return typeof stored === 'number' ? stored : 0;
    }
    function saveBest(v) { window.__ragecoreDashCarBest = v; }

    function laneX(lane) {
      return lane * laneWidth + laneWidth / 2 - carW / 2;
    }

    function reset() {
      playerLane = 1;
      obstacles = [];
      score = 0;
      speed = 1;
      roadOffset = 0;
      spawnTimer = 0;
      best = loadBest();
      scoreEl.textContent = score;
      bestEl.textContent = best;
      speedEl.textContent = speed.toFixed(1) + 'x';
      running = true;
      overlay.classList.add('hide');
      if (animId) cancelAnimationFrame(animId);
      loop();
    }

    function spawnObstacle() {
      const lane = Math.floor(Math.random() * laneCount);
      obstacles.push({ lane, y: -carH, color: Math.random() > 0.5 ? primary : secondary });
    }

    function loop() {
      if (!running) return;

      spawnTimer++;
      const spawnRate = Math.max(28, 60 - speed * 6);
      if (spawnTimer > spawnRate) {
        spawnObstacle();
        spawnTimer = 0;
      }

      score += 1;
      speed = 1 + Math.floor(score / 300) * 0.3;
      scoreEl.textContent = Math.floor(score / 10);
      speedEl.textContent = speed.toFixed(1) + 'x';

      const fallSpeed = 3 * speed;
      obstacles.forEach(o => (o.y += fallSpeed));
      obstacles = obstacles.filter(o => o.y < canvas.height + carH);

      roadOffset = (roadOffset + fallSpeed) % 40;

      // collision check
      const playerY = canvas.height - carH - 20;
      for (const o of obstacles) {
        if (
          o.lane === playerLane &&
          o.y + carH > playerY &&
          o.y < playerY + carH
        ) {
          return crash();
        }
      }

      draw(playerY);
      animId = requestAnimationFrame(loop);
    }

    function crash() {
      running = false;
      cancelAnimationFrame(animId);
      const finalScore = Math.floor(score / 10);
      if (finalScore > best) {
        best = finalScore;
        saveBest(best);
        bestEl.textContent = best;
      }
      overlayTitle.textContent = 'CRASHED';
      overlayTitle.classList.add('crash');
      overlayTitle.classList.remove('start');
      overlayText.textContent = 'Score: ' + finalScore;
      startBtn.textContent = 'Try Again';
      overlay.classList.remove('hide');
    }

    function draw(playerY) {
      // road
      ctx.fillStyle = roadColor;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // lane dividers
      ctx.strokeStyle = laneLine;
      ctx.lineWidth = 2;
      for (let i = 1; i < laneCount; i++) {
        ctx.setLineDash([16, 16]);
        ctx.lineDashOffset = -roadOffset;
        ctx.beginPath();
        ctx.moveTo(i * laneWidth, 0);
        ctx.lineTo(i * laneWidth, canvas.height);
        ctx.stroke();
      }
      ctx.setLineDash([]);

      // obstacles
      obstacles.forEach(o => {
        ctx.fillStyle = o.color;
        roundRect(laneX(o.lane), o.y, carW, carH, 8);
      });

      // player car
      ctx.fillStyle = accent;
      roundRect(laneX(playerLane), playerY, carW, carH, 8);
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
      ctx.fill();
    }

    function moveLeft() {
      if (playerLane > 0) playerLane -= 1;
    }
    function moveRight() {
      if (playerLane < laneCount - 1) playerLane += 1;
    }

    document.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      if (!running) return;
      if (key === 'arrowleft' || key === 'a') moveLeft();
      if (key === 'arrowright' || key === 'd') moveRight();
    });

    document.getElementById('leftBtn').addEventListener('click', () => running && moveLeft());
    document.getElementById('rightBtn').addEventListener('click', () => running && moveRight());

    startBtn.addEventListener('click', reset);

    // initial static draw before first start
    playerLane = 1;
    obstacles = [];
    roadOffset = 0;
    draw(canvas.height - carH - 20);
  </script>

</body>
</html>
