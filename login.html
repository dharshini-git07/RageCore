<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RageCore - Login</title>
    
    <!-- Google Fonts for Gaming Theme -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/login.css">
    
</head>
<body>
<div id="loaderSlot"></div>
    <!-- Animated Background Grid -->
    <div class="bg-animation"></div>
    
    

    <div class="login-container">
        <div class="login-card">
            <!-- Header -->
            <h1>RAGE <span class="text-gradient">CORE</span></h1>
            <p class="tagline">No Mercy. No Limits. No Surrender.</p>

            <!-- Login Form -->
            <form id="loginForm" action="#">
                <div class="input-group">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
                    </svg>
                    <input type="text" id="loginEmail" placeholder="Username" required>
                </div>

                <div class="input-group">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25a3 3 0 0 1 3 3m3 0a6 6 0 0 1-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1 .43-1.563A6 6 0 1 1 21.75 8.25Z" />
                    </svg>
                    <input type="password" id="loginPassword" placeholder="Password" required>
                </div>

                <button type="submit" id="login-submit-btn">Login</button>
            </form>

            <!-- Footer -->
            <p class="signup-link">Do you Have an Account? <a href="register.html">Sign-up</a></p>
        </div>
    </div>

    <!-- External JS Call -->
    <script src="Javascript/Dakshith.js"></script>
</body>
</html>
