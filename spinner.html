<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- ⚠️ IDHU KANDIPPA IRUKKANUM (DON'T COMMENT THIS OUT) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Proof Loader</title>

    <style>
        #loader {
            position: fixed;
            /* Mobile Fallback for inset */
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            height: -webkit-fill-available; /* iPhone Safari Fix */
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(3, 7, 18, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: opacity 0.45s ease, visibility 0.45s ease;
            padding: 1rem;
            box-sizing: border-box;
            /* Force Hardware Acceleration on Mobile GPU */
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
        }

        .loader-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        /* Mobile Optimized Spinner */
        .ring {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #8b5cf6;
            border-right-color: #ec4899;
            /* Mobile specific animation speed & acceleration */
            -webkit-animation: spin 0.8s linear infinite;
            animation: spin 0.8s linear infinite;
            transform: translate3d(0, 0, 0);
        }

        @-webkit-keyframes spin {
            0% { -webkit-transform: rotate(0deg); }
            100% { -webkit-transform: rotate(360deg); }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loader-text {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
        }

        /* Safe Mobile Dots Animation */
        #dots::after {
            content: '...';
            display: inline-block;
            overflow: hidden;
            vertical-align: bottom;
            animation: dots 1.5s steps(4, end) infinite;
            width: 0px;
        }

        @keyframes dots {
            to { width: 1.25em; }
        }

        #loader.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- ===== LOADER HTML ===== -->
    <div id="loader">
        <div class="loader-wrap">
            <div class="ring"></div>
            <div class="loader-text">Loading<span id="dots"></span></div>
        </div>
    </div>

    <!-- ===== SIMPLE JS TO TEST HIDING ON MOBILE ===== -->
    <script>
        // Page load aana udane mobile-la loader hide aaguratharku:
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');
            }, 1500); // 1.5 seconds-la hide aagum
        });
    </script>

</body>
</html>
